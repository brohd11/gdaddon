name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The makefile stamps the version via `git describe`, which needs tags
          # and history -- the default shallow checkout would yield "dev".
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: make package

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
