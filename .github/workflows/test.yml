name: test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test root module
        run: go test ./...

      - name: Test bubblestack module
        working-directory: bubblestack
        run: go test ./...
